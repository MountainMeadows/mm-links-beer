<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mountain Meadows $1 Beer</title>

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NDEN16QSD9"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NDEN16QSD9');
  </script>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f5132, #198754);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .container {
      max-width: 720px;
      width: 100%;
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      padding: 40px 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.25);
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3.4rem);
      line-height: 1.15;
      margin-bottom: 12px;
    }

    p {
      font-size: 1.05rem;
      margin: 10px 0 20px;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
      margin-top: 24px;
    }

    .btn {
      width: 100%;
      max-width: 360px;
      padding: 16px;
      border-radius: 12px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .instagram { background: white; color: #198754; }
    .reviews { background: #ffd54f; color: #222; }
    .claim { background: #0b2e13; color: white; }

    .claim:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .hidden { display: none; }

    .code-box {
      margin-top: 24px;
      padding: 20px;
      background: rgba(255,255,255,0.15);
      border-radius: 16px;
    }

    .code {
      margin-top: 10px;
      padding: 12px;
      background: white;
      color: #0f5132;
      font-size: 1.5rem;
      font-weight: bold;
      border-radius: 10px;
    }

    .small {
      margin-top: 24px;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .done {
      text-decoration: line-through;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>You are that much closer to a $1 beer 🍺</h1>
  <p>Follow us on Instagram and leave a review to unlock your code.</p>

  <div id="stepInstagram">1. Visit Instagram</div>
  <div id="stepReviews">2. Visit Reviews</div>

  <div class="buttons">
    <a class="btn instagram"
       href="https://www.instagram.com/mountainmeadowsgc"
       target="_blank"
       onclick="clickIG()">
       Instagram
    </a>

    <a class="btn reviews"
       href="https://www.google.com/search?q=mountain+meadows+google+reviews"
       target="_blank"
       onclick="clickReviews()">
       Reviews
    </a>

    <button id="claimBtn" class="btn claim" onclick="claimCode()" disabled>
      Claim Code
    </button>
  </div>

  <div id="codeBox" class="code-box hidden">
    <div>Your code:</div>
    <div id="code" class="code"></div>
  </div>

  <div class="small">
    Limit one code per device.
  </div>
</div>

<script>
  function generateCode() {
    const number = Math.floor(100 + Math.random() * 900);
    return "MM-" + number;
  }

  function clickIG() {
    localStorage.setItem("ig", "true");
    document.getElementById("stepInstagram").classList.add("done");
    update();
  }

  function clickReviews() {
    localStorage.setItem("rev", "true");
    document.getElementById("stepReviews").classList.add("done");
    update();
  }

  function update() {
    const ig = localStorage.getItem("ig") === "true";
    const rev = localStorage.getItem("rev") === "true";
    const claimed = localStorage.getItem("claimed") === "true";

    if (ig && rev && !claimed) {
      document.getElementById("claimBtn").disabled = false;
    }

    if (claimed) {
      showSaved();
    }
  }

  function claimCode() {
    const code = generateCode();

    localStorage.setItem("claimed", "true");
    localStorage.setItem("code", code);

    document.getElementById("code").innerText = code;
    document.getElementById("codeBox").classList.remove("hidden");
  }

  function showSaved() {
    const code = localStorage.getItem("code");
    if (!code) return;

    document.getElementById("code").innerText = code;
    document.getElementById("codeBox").classList.remove("hidden");
  }

  update();
</script>

</body>
</html>
